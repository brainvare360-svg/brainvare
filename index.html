<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Fallback meta — overridden by react-helmet-async on hydration -->
    <title>Brainvare | AI-First Creative Studio — Strategy, Design & Technology</title>
    <meta name="description" content="Brainvare is an AI-first creative studio in Kochi, Kerala. We integrate data, design, and technology to scale brands — AI implementation, web development, SEO & performance marketing." />
    <meta name="keywords" content="AI creative studio, digital marketing agency, web development, AI implementation, SEO, AEO, Kerala, Kochi, India" />
    <meta name="author" content="Brainvare" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />

    <!-- Open Graph fallback (critical for social crawlers that don't run JS) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.brainvare.com/" />
    <meta property="og:title" content="Brainvare | AI-First Creative Studio" />
    <meta property="og:description" content="AI-first creative studio integrating data, design, and technology to scale your brand." />
    <meta property="og:image" content="https://www.brainvare.com/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Brainvare" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card fallback -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brainvare | AI-First Creative Studio" />
    <meta name="twitter:description" content="AI-first creative studio integrating data, design, and technology." />
    <meta name="twitter:image" content="https://www.brainvare.com/logo.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.brainvare.com/" />

    <!-- DNS Prefetch & Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.pixabay.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Google Fonts — async non-render-blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" /></noscript>

    <!-- Structured Data fallback (visible to all crawlers before JS runs) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Brainvare",
      "url": "https://www.brainvare.com",
      "logo": "https://www.brainvare.com/logo.png",
      "description": "AI-first creative studio integrating data, design, and technology to scale brands.",
      "email": "care@brainvare.com",
      "telephone": "+918075098869",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Kochi",
        "addressRegion": "Kerala",
        "addressCountry": "IN"
      },
      "sameAs": [
        "https://www.instagram.com/brainvare",
        "https://www.linkedin.com/company/brainvare"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Noscript fallback for crawlers that don't execute JS -->
    <noscript>
      <div style="padding:2rem;text-align:center;font-family:sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;">
        <h1>Brainvare — AI-First Creative Studio</h1>
        <p>We integrate data, design, and technology to scale your brand.</p>
        <p>Services: AI Strategy, LLM Integration, Web Development, Performance Marketing</p>
        <p>Contact: <a href="mailto:care@brainvare.com" style="color:#ef4444;">care@brainvare.com</a> | +91 80750 98869</p>
        <p>Location: Infopark, Kochi, Kerala, India</p>
        <nav>
          <a href="/services" style="color:#ef4444;margin:0 1rem;">Services</a>
          <a href="/work" style="color:#ef4444;margin:0 1rem;">Work</a>
          <a href="/about" style="color:#ef4444;margin:0 1rem;">About</a>
          <a href="/blog" style="color:#ef4444;margin:0 1rem;">Blog</a>
          <a href="/careers" style="color:#ef4444;margin:0 1rem;">Careers</a>
        </nav>
      </div>
    </noscript>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
